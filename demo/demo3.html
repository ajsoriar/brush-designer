<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Brush Designer Demo I</title>
    <link rel="stylesheet" href="../src/components/jqbrushdesigner/jqbrushdesigner.css" type="text/css" />
    <link rel="stylesheet" href="../src/components/paintBoard/paintBoard.css" type="text/css" />
    <link rel="stylesheet" href="../src/components/simpleColorPicker/simpleColorPicker.css" type="text/css" />
    <link rel="stylesheet" href="../src/components/simpleLineWidthPicker/simpleLineWidthPicker.css" type="text/css" />
    <link rel="stylesheet" href="../src/components/windowsManager/windowsManager.css" type="text/css" />
</head>

<body style="background-color: #444;">
    <div id="app-menu">
        <button type="button" onclick="openBrushDesignerInWindow()">Open BD in a window</button>
        <button type="button" onclick="createDemoWindow('normal')">Create resizable window</button>
        <button type="button" onclick="createDemoWindow('fixed')">Create fixed window</button>
        <button type="button" onclick="createDemoWindow('notResizable')">Create not resizable window</button>
        <button type="button" onclick="createDemoWindow('paintBoard')">Create paint board window</button>
        <button type="button" onclick="openSimpleColorPickerWindow()">Open color picker</button>
        <button type="button" onclick="openSimpleLineWidthPickerWindow()">Open line width picker</button>
    </div>

    <script src="../node_modules/jquery/dist/jquery.min.js"></script>
    <script src="../src/components/jqbrushdesigner/jqbrushdesigner.js"></script>
    <script src="../src/components/paintBoard/paintBoard.js"></script>
    <script src="../src/components/simpleColorPicker/simpleColorPicker.js"></script>
    <script src="../src/components/simpleLineWidthPicker/simpleLineWidthPicker.js"></script>
    <script src="../src/components/windowsManager/windowsManager.js"></script>
    <script src="../src/zoom.js"></script>
    <script>
        var be = null; 
        var demoWindowCount = 0;
        var appColorPicker = null;
        var appLineWidthPicker = null;

        $(document).ready(function() {
            console.log("jQuery document ready!");
            openBrushEditorOutputsWindow();
            openSimpleColorPickerWindow();
            //openEditor();

            /*
            paintBoard({
                width: 1024,
                height: 1024,
                backgroundColor: '#000',
                onSave: function( data ){

                    storeImage( data );
                }
            });
            */
        });

        function openEditor() {

            be = $.brushEditor({

                beforeClose: function() {
                    renderBruses();
                }
            });

            console.log("be:", be );

            openBrushEditorOutputsWindow();
            //be.open();
        }

        function createDemoWindow(type) {
            demoWindowCount += 1;

            if (type === "fixed") {
                WindowsManager.create({
                    id: "demo-fixed-window-" + demoWindowCount,
                    title: "Fixed window " + demoWindowCount,
                    x: 520,
                    y: 80,
                    width: 300,
                    height: 180,
                    fixed: true,
                    content: "<p>This window is fixed. It cannot move or resize.</p>"
                });
                return;
            }

            if (type === "notResizable") {
                WindowsManager.create({
                    id: "demo-not-resizable-window-" + demoWindowCount,
                    title: "Movable not resizable " + demoWindowCount,
                    x: 180,
                    y: 260,
                    width: 360,
                    height: 220,
                    resizable: false,
                    content: "<p>This window moves from the top bar, but cannot resize.</p>"
                });
                return;
            }

            if (type === "paintBoard") {
                var paintBoardWidth = 800;
                var paintBoardHeight = 600;
                var windowFrameWidth = 16;
                var windowFrameHeight = 64;
                var paintBoard;
                var paintBoardWindow = WindowsManager.create({
                    id: "demo-paint-board-window-" + demoWindowCount,
                    title: "Paint Board " + demoWindowCount,
                    x: 120,
                    y: 120,
                    width: paintBoardWidth + windowFrameWidth,
                    height: paintBoardHeight + windowFrameHeight,
                    resizable: false,
                    toolsRow: true,
                    scrollBarX: true,
                    scrollBarY: true,
                    contentId: "demo-paint-board-window-content-" + demoWindowCount
                });

                paintBoard = PaintBoard({
                    id: "demo-paint-board-" + demoWindowCount,
                    containerId: paintBoardWindow.contentId,
                    width: paintBoardWidth,
                    height: paintBoardHeight,
                    backgroundColor: "#ffffff"
                });
                paintBoard.window = paintBoardWindow;
                initPaintBoardToolbar(paintBoard);

                return;
            }

            WindowsManager.create({
                id: "demo-resizable-window-" + demoWindowCount,
                title: "Resizable window " + demoWindowCount,
                x: 80,
                y: 80,
                width: 420,
                height: 260,
                content: "<p>This window can move, resize, minimize and close.</p>"
            });
        }

        function initPaintBoardToolbar(paintBoard) {
            var toolbar;
            var zoomOptions = [
                { label: "50%", zoom: 0.5 },
                { label: "Actual Size", zoom: 1, title: "100%" },
                { label: "200%", zoom: 2 },
                { label: "400%", zoom: 4 }
            ];

            if (!paintBoard || !paintBoard.window || !paintBoard.window.toolsRowElement) {
                return;
            }

            toolbar = document.createElement("div");
            toolbar.className = "paint-board-toolbar";

            zoomOptions.forEach(function(option) {
                var button = document.createElement("button");

                button.type = "button";
                button.className = "paint-board-toolbar-btn";
                button.textContent = option.label;
                button.title = option.title || option.label;
                button.addEventListener("click", function() {
                    if (window.Zoom && window.Zoom.setActiveBoard) {
                        window.Zoom.setActiveBoard(paintBoard.element);
                    }

                    if (window.Zoom && window.Zoom.setBoardZoom) {
                        window.Zoom.setBoardZoom(paintBoard.element, option.zoom);
                    }
                });

                toolbar.appendChild(button);
            });

            paintBoard.window.toolsRowElement.innerHTML = "";
            paintBoard.window.toolsRowElement.appendChild(toolbar);
        }

        function openBrushDesignerInWindow() {
            var existingWindow = WindowsManager.getWindowByWindowId("brush-designer");

            if (existingWindow) {
                WindowsManager.bringToFront(existingWindow);
                return;
            }

            var brushDesignerWidth = 660;
            var brushDesignerHeight = 700;
            var windowFrameWidth = 16;
            var windowFrameHeight = 36;
            var outerWidth = brushDesignerWidth + windowFrameWidth;
            var outerHeight = brushDesignerHeight + windowFrameHeight;
            var x = Math.max(0, Math.round((window.innerWidth - outerWidth) / 2));
            var y = Math.max(0, Math.round((window.innerHeight - outerHeight) / 2));
            var bdWindow = WindowsManager.create({
                id: "brush-designer-window",
                windowId: "brush-designer",
                title: "Brush Designer",
                x: x,
                y: y,
                width: outerWidth,
                height: outerHeight,
                resizable: false,
                minimizable: false,
                scrollBarX: false,
                scrollBarY: false,
                contentId: "brush-designer-window-content"
            });

            be = $.brushEditor({

                showCloseButton: false,

                beforeClose: function() {
                    renderBruses();
                    WindowsManager.closeWindow("brush-designer-window");
                }
            });

            $(".be-back-bg").remove();
            $("#window-brush-editor").appendTo(bdWindow.contentElement);
            openBrushEditorOutputsWindow();
        }

        function openBrushEditorOutputsWindow() {
            var outputsWidth = 170;
            var outputsHeight = 700;
            var windowFrameWidth = 16;
            var windowFrameHeight = 36;
            var outerWidth = outputsWidth + windowFrameWidth;
            var outerHeight = outputsHeight + windowFrameHeight;
            var x = Math.max(0, window.innerWidth - outerWidth - 20);
            var y = Math.max(0, Math.round((window.innerHeight - outerHeight) / 2));
            var outputsElement = document.getElementById("brush-editor-outputs");
            var outputsWindow = WindowsManager.create({
                id: "brush-editor-outputs-window",
                windowId: "brush-editor-outputs",
                title: "Brush outputs",
                x: x,
                y: y,
                width: outerWidth,
                height: outerHeight,
                resizable: false,
                topBarGradient: {
                    a: "#2563eb",
                    b: "#14b8a6",
                    orientacion: "vertical"
                },
                scrollBarX: false,
                scrollBarY: true,
                contentId: "brush-editor-outputs-window-content"
            });

            if (!outputsElement) {
                outputsElement = document.createElement("ol");
                outputsElement.id = "brush-editor-outputs";
            }

            outputsWindow.contentElement.appendChild(outputsElement);
        }

        function openSimpleColorPickerWindow() {
            var existingWindow = WindowsManager.getWindowByWindowId("simple-color-picker");

            if (existingWindow) {
                WindowsManager.bringToFront(existingWindow);
                return appColorPicker;
            }

            var pickerWidth = 360;
            var pickerHeight = 220;
            var windowFrameWidth = 16;
            var windowFrameHeight = 36;
            var pickerWindow = WindowsManager.create({
                id: "simple-color-picker-window",
                windowId: "simple-color-picker",
                title: "Simple Color Picker",
                x: 20,
                y: 40,
                width: pickerWidth + windowFrameWidth,
                height: pickerHeight + windowFrameHeight,
                minWidth: 120,
                minHeight: 120,
                resizable: true,
                cornerRadius: 100,
                topBarGradient: {
                    a: "#2563eb",
                    b: "#14b8a6",
                    orientacion: "horizontal"
                },
                scrollBarX: false,
                scrollBarY: false,
                contentId: "simple-color-picker-window-content"
            });

            appColorPicker = SimpleColorPicker({
                id: "app-simple-color-picker",
                containerId: pickerWindow.contentId,
                columns: 15,
                rows: 10,
                colorGap: 0,
                activeColor: "#000000", 
                onColorSelected: function(color) {
                    console.log("Selected color:", color);
                },
                color: {
                    defaultWidth: 17, // px. The window wil be rescaled to
                    defaultHeight: 17, // px
                }
            });

            var w = appColorPicker.getWidth();
            var h = appColorPicker.getHeight();

            pickerWindow.scaleToContent(w,h)

            return appColorPicker;
        }

        function openSimpleLineWidthPickerWindow() {
            var existingWindow = WindowsManager.getWindowByWindowId("simple-line-width-picker");

            if (existingWindow) {
                WindowsManager.bringToFront(existingWindow);
                return appLineWidthPicker;
            }

            var pickerWidth = 120;
            var pickerHeight = 260;
            var windowFrameWidth = 16;
            var windowFrameHeight = 36;
            var pickerWindow = WindowsManager.create({
                id: "simple-line-width-picker-window",
                windowId: "simple-line-width-picker",
                title: "Line Width",
                x: 20,
                y: 300,
                width: pickerWidth + windowFrameWidth,
                height: pickerHeight + windowFrameHeight,
                minWidth: 90,
                minHeight: 120,
                resizable: true,
                scrollBarX: false,
                scrollBarY: false,
                contentId: "simple-line-width-picker-window-content"
            });

            appLineWidthPicker = SimpleLineWidthPicker({
                id: "app-simple-line-width-picker",
                containerId: pickerWindow.contentId,
                minWidth: 1,
                maxWidth: 15,
                steps: 8,
                activeLineWidth: 1,
                onLineWidthSelected: function(lineWidth) {
                    console.log("Selected line width:", lineWidth);
                }
            });

            pickerWindow.scaleToContent(appLineWidthPicker.getWidth(), appLineWidthPicker.getHeight());

            return appLineWidthPicker;
        }

        function renderBruses(){
            console.log("beforeClose!");
            /*

        }

            console.log("storeImage! data:", data );

    </script>
