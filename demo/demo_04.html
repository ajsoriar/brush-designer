<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Brush Designer II Demo</title>
    <style>
        body {
            background-color: #444;
            color: #f3f3f3;
            font-family: Arial, sans-serif;
        }

        #target {
            margin: 30px;
            width: 380px;
            height: 475px;
        }

        #brush-output {
            margin: 30px;
            max-width: 380px;
            color: #111;
            background-color: #fff;
            border: 1px solid #aaa;
            padding: 10px;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>

    <h1>Brush Designer II Demo</h1>

    <p>This is a demo of the Brush Designer II. A native JS component for designing brushes. Photoshop-like
        functionality.</p>

    <button type="button" onclick="openEditor()">Open Brush Editor v2!</button>
    <div id="target"></div>
    <pre id="brush-output"></pre>

    <script src="../src/components/brushdesigner.v2/brushdesigner.v2.js"></script>
    <script>

        var be = null;

        document.addEventListener("DOMContentLoaded", function () {
            openEditor();
        });

        function openEditor() {
            be = createBrushDesignerV2(document.getElementById("target"), {
                size: 64,
                hardness: 50,
                onChange: function (brush) {
                    document.getElementById("brush-output").textContent = JSON.stringify(brush, null, 2);
                }
            });

            console.log("be:", be);
        }

    </script>
</body>

</html>
