<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Brush Designer</title>
</head>

<body style="background-color: #444;">

    <div id="tools-bar" class="tools-bar">
        <button type="button" onclick="openBrushDesignerInWindow()">Open Brush Designer</button>
        <button type="button" onclick="openBrushDesigner2InWindow()">Open Brush Designer2</button>
        <button type="button" onclick="newDocument()">New Document</button>
        <button type="button" onclick="createDemoWindow('paintBoard')">Create paint board window</button>
        <button type="button" onclick="openBigColorPickerWindow()">Open big color picker</button>
        <button type="button" onclick="openSimpleColorPickerWindow()">Open color picker</button>
        <button type="button" onclick="openSimpleLineWidthPickerWindow()">Open line width picker</button>
        <button type="button" onclick="openLinesDesignerWindow()">Open lines designer</button>
        <button type="button" onclick="openPaintToolsWindow()">Open paint tools</button>
        <button type="button" onclick="openStarGeneratorWindow()">Open star generator</button>
        <button type="button" onclick="pasteFromClipboard()">Paste</button>
        <button type="button" onclick="copyToClipboard()">Copy</button>
        <button type="button" onclick="saveImage()">Save</button>
        <button type="button" onclick="clearBoard()">Clear Board</button>
    </div>

    <script type="module" src="/main.js"></script>
</body>

</html>
